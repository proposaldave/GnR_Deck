</style></head><body><iframe id="frame" src="assets/v2/cs-frontier-iconic/v1-hero-human-truth.html"></iframe><div class="nav"><button data-i="0" title="cs-frontier-iconic"></button><button data-i="1" title="cs-1m8"></button><button data-i="2" title="cs-a7m1"></button><button data-i="3" title="cs-1bm1"></button><button data-i="4" title="cs-2c"></button><button data-i="5" title="cs-thegap"></button><button data-i="6" title="cs-gnr"></button><button data-i="7" title="cs-11d"></button><button data-i="8" title="cs-11e"></button><button data-i="9" title="cs-11"></button><button data-i="10" title="cs-3"></button><button data-i="11" title="cs-magnetic"></button><button data-i="12" title="cs-samecourt"></button><button data-i="13" title="cs-19"></button><button data-i="14" title="cs-pbfirst"></button><button data-i="15" title="cs-fw1"></button><button data-i="16" title="cs-18-vd4"></button><button data-i="17" title="cs-fv6"></button><button data-i="18" title="cs-wedge1"></button><button data-i="19" title="cs-16"></button><button data-i="20" title="cs-27"></button><button data-i="21" title="cs-mv6"></button><button data-i="22" title="cs-brand-V8"></button></div><div class="count" id="count"></div><script>
const slides=["assets/v2/cs-frontier-iconic/v1-hero-human-truth.html","assets/v2/cs-1m8/v2-type-wordmark.html","assets/v2/cs-a7m1/v2-type-old-new.html","assets/v2/cs-1bm1/v2-type-imbalance.html","assets/v2/cs-2c/v2-type-community-grid.html","assets/v2/cs-thegap/v1-hero-missing-signal.html","assets/v2/cs-gnr/v2-type-product-invite.html","assets/v2/cs-11d/v2-type-implicit-signal.html","assets/v2/cs-11e/v1-hero-wedge-proof.html","assets/v2/cs-11/v2-type-measurement.html","assets/v2/cs-3/v2-type-signal-density.html","assets/v2/cs-magnetic/v2-type-magnetic.html","assets/v2/cs-samecourt/v1-hero-incentives.html","assets/v2/cs-19/v2-type-revenue.html","assets/v2/cs-pbfirst/v1-hero-wedge.html","assets/v2/cs-fw1/v2-type-flywheel.html","assets/v2/cs-18-vd4/v2-type-founder.html","assets/v2/cs-fv6/v2-type-verbs.html","assets/v2/cs-wedge1/v2-type-expansion.html","assets/v2/cs-16/v2-type-training.html","assets/v2/cs-27/v2-type-cto.html","assets/v2/cs-mv6/v1-hero-mission.html","assets/v2/cs-brand-V8/v2-type-brand.html"];let current=0;const frame=document.getElementById('frame');const dots=[...document.querySelectorAll('.nav button')];function go(i){current=Math.max(0,Math.min(slides.length-1,i));frame.src=slides[current];dots.forEach((d,idx)=>d.classList.toggle('on',idx===current));document.getElementById('count').textContent=String(current+1).padStart(2,'0')+' / '+String(slides.length).padStart(2,'0')}dots.forEach(d=>d.onclick=()=>go(+d.dataset.i));document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '||e.key==='d')go(current+1);if(e.key==='ArrowLeft'||e.key==='a')go(current-1)});go(0);
</script></body></html>
